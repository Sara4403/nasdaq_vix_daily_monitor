name: Nasdaq VIX Daily Monitor

on:
  schedule:
    # 每天北京时间 9:30 运行，对应 UTC 前一天 1:30（夏令时会有偏差，可后续再调）
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor script
        env:
          QQ_EMAIL_SENDER: ${{ secrets.QQ_EMAIL_SENDER }}
          QQ_EMAIL_AUTH_CODE: ${{ secrets.QQ_EMAIL_AUTH_CODE }}
          QQ_EMAIL_RECEIVER: ${{ secrets.QQ_EMAIL_RECEIVER }}
        run: |
          python nasdaq_vix_daily_monitor.py

      - name: Commit generated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nasdaq_vix_monitor_summary.csv nasdaq_vix_monitor_report.md nasdaq_vix_daily_data.csv || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update daily Nasdaq 100 VIX monitor report"
            git push
          fi
